# PropHunt Configuration
# Supports gradients with <gradient:#RRGGBB:#RRGGBB>text</gradient>
# Supports single hex colors with &#RRGGBB

gameplay:
    # Ticks a hider must stand still before their block solidifies (20 ticks = 1 second)
    lock-ticks: 60

    # Number of hits a hider can take before being found
    hider-hp: 3

    # Seconds seekers are held back at the start of the game
    seeker-grace-seconds: 30

    # Total game duration in seconds after seekers are released
    game-duration-seconds: 300

    # Maximum number of blocks sampled from the selected arena cuboid when building
    # the random hider block pool. Higher values are more accurate but heavier.
    arena-scan-max-blocks: 120000

    # Team sizing: one seeker per this many players, rounded up, minimum 1 seeker.
    players-per-seeker: 3

    # Cooldown applied to seeker hits to avoid duplicate hit events.
    seeker-hit-cooldown-ticks: 4

    # Extra blindness seconds added to seekers while frozen so the effect does not expire early.
    freeze-blindness-buffer-seconds: 5

    # Show the release countdown title for the last N seconds.
    countdown-title-threshold-seconds: 5

    # Broadcast a time-remaining message when the round reaches these second values.
    round-warning-seconds:
        - 300
        - 60

    # Main deny list used by disguise validation.
    # This includes the blocks that were previously hardcoded in GameManager.
    blocked-disguise-blocks:
        - BEDROCK
        - BARRIER
        - COMMAND_BLOCK
        - CHAIN_COMMAND_BLOCK
        - REPEATING_COMMAND_BLOCK
        - WATER
        - LAVA
        - LIGHT
        - STRUCTURE_VOID
        - WHITE_CARPET
        - ORANGE_CARPET
        - MAGENTA_CARPET
        - LIGHT_BLUE_CARPET
        - YELLOW_CARPET
        - LIME_CARPET
        - PINK_CARPET
        - GRAY_CARPET
        - LIGHT_GRAY_CARPET
        - CYAN_CARPET
        - PURPLE_CARPET
        - BLUE_CARPET
        - BROWN_CARPET
        - GREEN_CARPET
        - RED_CARPET
        - BLACK_CARPET
        - SNOW
        - SNOW_BLOCK

    # Whitelist for non-solid blocks that should still be valid disguises.
    allowed-non-solid-disguise-blocks:
        - SHORT_GRASS
        - FERN
        - TALL_GRASS
        - LARGE_FERN
        - SUNFLOWER
        - LILAC
        - ROSE_BUSH
        - PEONY
        - PITCHER_PLANT
        - WHITE_BED
        - ORANGE_BED
        - MAGENTA_BED
        - LIGHT_BLUE_BED
        - YELLOW_BED
        - LIME_BED
        - PINK_BED
        - GRAY_BED
        - LIGHT_GRAY_BED
        - CYAN_BED
        - PURPLE_BED
        - BLUE_BED
        - BROWN_BED
        - GREEN_BED
        - RED_BED
        - BLACK_BED
        - IRON_DOOR
        - OAK_DOOR
        - SPRUCE_DOOR
        - BIRCH_DOOR
        - JUNGLE_DOOR
        - ACACIA_DOOR
        - DARK_OAK_DOOR
        - MANGROVE_DOOR
        - CHERRY_DOOR
        - PALE_OAK_DOOR
        - BAMBOO_DOOR
        - CRIMSON_DOOR
        - WARPED_DOOR

    # Explicitly allow specific disguise blocks, bypassing built-in restrictions.
    # Use this for special cases that you know are safe for your server.
    # Example values: IRON_DOOR, WHITE_BED, TALL_GRASS
    force-allow-disguise-blocks: []

    # Explicitly deny specific disguise blocks, even if they would normally be allowed.
    # Useful for quickly removing problematic blocks without code changes.
    force-deny-disguise-blocks: []

    # Used when arena sampling finds no valid blocks.
    default-hider-blocks:
        - GRASS_BLOCK
        - DIRT
        - STONE
        - COBBLESTONE
        - OAK_LOG
        - BIRCH_LOG
        - SAND
        - GRAVEL
        - OAK_PLANKS
        - SPRUCE_PLANKS
        - BRICKS
        - MOSSY_COBBLESTONE
        - BOOKSHELF
        - CRAFTING_TABLE
        - CHEST
        - BARREL
        - HAY_BLOCK
        - MELON
        - PUMPKIN
        - TNT
        - CACTUS
        - CLAY
        - SMOOTH_STONE
        - ANDESITE
        - DIORITE
        - GRANITE
        - OAK_LEAVES
        - SNOW_BLOCK
        - ICE
        - FURNACE

display:
