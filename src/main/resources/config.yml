# Legacy top-level gameplay keys are still read as fallbacks for older configs.
# Arena data is written by commands under this section.
# Example setup flow:
# /prophunt arena create arena1
# /prophunt arena pos1 arena1
# /prophunt arena pos2 arena1
# /prophunt arena addhiderspawn arena1
# /prophunt arena addseekerspawn arena1
# arenas:
#   arena1:
#     world: world
#     pos1: {x: 0, y: 64, z: 0, yaw: 0, pitch: 0}
#     pos2: {x: 50, y: 90, z: 50, yaw: 0, pitch: 0}
#     hider-spawns: []
#     seeker-spawns: []
