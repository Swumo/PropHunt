    seeker-role:
        title: "<gradient:#FB7185:#EF4444>You are the SEEKER</gradient>"
        subtitle: "&#FDE68AFrozen and blinded until release"
    hider-role:
        title: "<gradient:#34D399:#10B981>You are a HIDER</gradient>"
        subtitle: "&#FDE68AStand still to solidify before release"
    seekers-waiting:
        title: "<gradient:#F97316:#EF4444>Waiting for hiders to hide...</gradient>"
        subtitle: "&#FDE68AReleasing in {seconds}s"
    release-countdown:
        title: "<gradient:#FB7185:#F43F5E>Release in {seconds}</gradient>"
        subtitle: "&#D1D5DBGet ready"
    seekers-released:
        title: "<gradient:#F97316:#EF4444>Seekers Released</gradient>"
        subtitle: "&#FDE68AFind the props"
    seekers-go:
        title: "<gradient:#F59E0B:#EF4444>GO</gradient>"
        subtitle: "&#FDE68AFind the hiders"
    solidified:
        title: "<gradient:#67E8F9:#38BDF8>SOLIDIFIED</gradient>"
        subtitle: "&#FDE68AYou are locked in place"
    unlocked:
        title: "<gradient:#FDE68A:#F59E0B>UNLOCKED</gradient>"
        subtitle: "<gradient:#86EFAC:#22C55E>Keep moving</gradient>"
    found:
        title: "<gradient:#FB7185:#B91C1C>You Were Found</gradient>"
        subtitle: "&#D1D5DBYou are now a seeker"
    hiders-win:
